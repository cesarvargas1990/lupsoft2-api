name: Deploy (SSH)

on:
  workflow_run:
    workflows: ["Laravel"]
    branches: ["main"]
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: deploy-ssh-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd /home/${{ secrets.SSH_USER }}/lupsoft2-api
            git fetch origin
            if git show-ref --verify --quiet refs/heads/main; then
              git checkout main
            else
              git checkout -b main --track origin/main
            fi
            git pull origin main
            docker compose up --build -d

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run post-deploy real API query tests
        env:
          BASE_URL: ${{ vars.API_BASE_URL != '' && vars.API_BASE_URL || 'http://147.93.1.252:8002' }}
          ADMIN_EMAIL: ${{ secrets.API_ADMIN_EMAIL != '' && secrets.API_ADMIN_EMAIL || 'admin@admin.com' }}
          ADMIN_PASSWORD: ${{ secrets.API_ADMIN_PASSWORD != '' && secrets.API_ADMIN_PASSWORD || 'password' }}
          REPORT_FILE: logs/api_real_query_tests_report.txt
        run: ./scripts/api_real_query_tests.sh

      - name: Upload post-deploy API test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-deploy-api-real-query-tests-report
          path: logs/api_real_query_tests_report.txt
          if-no-files-found: warn
